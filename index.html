<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: #e8e5e0;
      --border-strong: #c8c4be;
      --text: #1a1917;
      --text-muted: #7a776f;
      --text-hint: #b0ada6;
      --accent: #1a1917;
      --user-bg: #1a1917;
      --user-text: #f9f8f6;
      --radius: 14px;
      --radius-sm: 8px;
      --font: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── MODE BAR ── */
    #mode-bar {
      display: flex;
      gap: 6px;
      padding: 14px 16px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mode-btn:hover { border-color: var(--border-strong); color: var(--text); }

    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #f9f8f6;
    }

    /* ── CHAT WINDOW ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── MESSAGES ── */
    .msg-group { display: flex; flex-direction: column; gap: 3px; }
    .msg-group.user { align-items: flex-end; }
    .msg-group.bot { align-items: flex-start; }

    .bot-label {
      font-size: 11px;
      color: var(--text-hint);
      letter-spacing: 0.03em;
      padding-left: 40px;
      margin-bottom: 2px;
    }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-group.user .msg-row { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .bubble {
      max-width: 76%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.65;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .msg-group.bot .bubble {
      background: var(--surface);
      color: var(--text);
      border-radius: 4px var(--radius) var(--radius) var(--radius);
    }

    .msg-group.bot.task .bubble {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .msg-group.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-color: var(--user-bg);
      border-radius: var(--radius) var(--radius) 4px var(--radius);
    }

    /* ── TYPING INDICATOR ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-hint);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── INPUT ROW ── */
    #input-area {
      padding: 12px 16px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 14px;
      transition: border-color 0.15s;
    }

    #input-row:focus-within { border-color: var(--border-strong); }

    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 22px;
      max-height: 100px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--text-hint); }

    #send-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--accent);
      color: #f9f8f6;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    #send-btn svg { width: 15px; height: 15px; }
  </style>
</head>
<body>

  <div id="mode-bar">
    <button class="mode-btn active" id="btn-task" onclick="setMode('task')">🤖 Task AI</button>
    <button class="mode-btn" id="btn-social" onclick="setMode('social')">😊 Social AI</button>
  </div>

  <div id="chat-window"></div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" placeholder="Type a message..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
      <button id="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    // ── CONFIG ── 배포 후 아래 URL을 본인 Vercel 주소로 변경하세요
    const PROXY_URL = 'https://aics-chatbot-eta.vercel.app/api/chat';

    const LENGTH_RULE = `Your response MUST contain exactly 4 to 5 sentences — no more, no less. Count your sentences carefully. Do not use bullet points or numbered lists.`;

    const MODES = {
      task: {
        name: 'Task AI',
        avatar: '🤖',
        greeting: 'Enter your query.',
        system: `You are a task-oriented assistant. Always respond in English. Answer like a robot, not a human. Do not include any social greetings. Start every sentence with a subject followed by a verb (e.g. "I recommend...", "I suggest...", "This method improves..."). Use clear, direct, factual language. ${LENGTH_RULE}`
      },
      social: {
        name: 'Social AI',
        avatar: '😊',
        greeting: 'Hey there! 😊 So great to meet you! Feel free to ask me anything! 🥰',
        system: `You are a kind and friendly assistant. Always respond in English. Answer like a close, warm friend. Use a conversational, casual tone. Include facial emojis (😊 😄 🥰 😅 😂 🤔 😎 🙌) naturally — at least one per 1–2 sentences. ${LENGTH_RULE}`
      }
    };

    let mode = 'task';
    let history = [];
    let isLoading = false;

    function setMode(m) {
      mode = m;
      history = [];
      document.getElementById('btn-task').className = 'mode-btn' + (m === 'task' ? ' active' : '');
      document.getElementById('btn-social').className = 'mode-btn' + (m === 'social' ? ' active' : '');
      document.getElementById('chat-window').innerHTML = '';
      addBotMsg(MODES[m].greeting);
    }

    function addBotMsg(text) {
      const win = document.getElementById('chat-window');
      const group = document.createElement('div');
      group.className = `msg-group bot ${mode}`;
      group.innerHTML = `
        <div class="bot-label">${MODES[mode].name}</div>
        <div class="msg-row">
          <div class="avatar">${MODES[mode].avatar}</div>
          <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
        </div>`;
      win.appendChild(group);
      win.scrollTop = win.scrollHeight;
    }

    function addUserMsg(text) {
      const win = document.getElementById('chat-window');
      const group = document.createElement('div');
      group.className = 'msg-group user';
      group.innerHTML = `
        <div class="msg-row">
          <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
        </div>`;
      win.appendChild(group);
      win.scrollTop = win.scrollHeight;
    }

    function showTyping() {
      const win = document.getElementById('chat-window');
      const group = document.createElement('div');
      group.className = `msg-group bot ${mode}`;
      group.id = 'typing-indicator';
      group.innerHTML = `
        <div class="bot-label">${MODES[mode].name}</div>
        <div class="msg-row">
          <div class="avatar">${MODES[mode].avatar}</div>
          <div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
        </div>`;
      win.appendChild(group);
      win.scrollTop = win.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }
    async function sendMsg() {
      if (isLoading) return;
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';
      addUserMsg(text);
      history.push({ role: 'user', content: text });
      isLoading = true;
      document.getElementById('send-btn').disabled = true;
      showTyping();
      try {
        const res = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'gpt-4o',
            max_tokens: 300,
            messages: [
              { role: 'system', content: MODES[mode].system },
              ...history
            ]
          })  // ← 이 괄호가 빠져 있었어요
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;  // ← OpenAI 응답 방식
        history.push({ role: 'assistant', content: reply });
        removeTyping();
        addBotMsg(reply);
      } catch (e) {
        removeTyping();
        addBotMsg('Error: Unable to connect. Please check the server.');
      }
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
    }


    setMode('task');
  </script>
</body>
</html>
